name: Supabase Keep-Alive

on:
  schedule:
    # Runs at 00:00 every 5 days
    - cron: '0 0 */5 * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Heartbeat to Supabase
        run: |
          curl -X GET "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/shared_finds?select=id&limit=1" 
          -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" 
          -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
